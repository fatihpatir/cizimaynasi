<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Canlı ve Yaratıcı Gradyan (Apple Creative Style) -->
    <linearGradient id="vibrant_grad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF2D55"/> <!-- Pembe -->
      <stop offset="0.5" stop-color="#AF52DE"/> <!-- Mor -->
      <stop offset="1" stop-color="#5856D6"/> <!-- Mavi -->
    </linearGradient>
    
    <filter id="soft_glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10"/>
    </filter>
  </defs>

  <!-- Arka Plan: Canlı Yuvarlatılmış Kare -->
  <rect width="512" height="512" rx="114" fill="url(#vibrant_grad)"/>
  
  <!-- İç Işıltı -->
  <rect x="20" y="20" width="472" height="472" rx="100" stroke="white" stroke-opacity="0.2" stroke-width="2"/>

  <!-- Karakalem / Eskiz Dokunuşlu Ayna Figürü -->
  <!-- Ayna Çerçevesi -->
  <circle cx="256" cy="240" r="130" stroke="white" stroke-width="12" stroke-linecap="round" stroke-dasharray="20 15"/>
  
  <!-- İç Cam Parlaması -->
  <path d="M190 180C210 160 260 150 310 180" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  
  <!-- Kalem ve Çizim Hattı -->
  <g filter="url(#soft_glow)">
    <path d="M400 100L180 320" stroke="white" stroke-width="30" stroke-linecap="round" opacity="0.3"/>
  </g>
  <path d="M400 100L180 320" stroke="white" stroke-width="14" stroke-linecap="round"/>
  
  <!-- Kalem Ucu (Eskiz Hissi) -->
  <path d="M180 320L150 350L150 310L180 320Z" fill="white"/>
  
  <!-- Küçük Sanatsal Yıldızlar/Işıltılar -->
  <circle cx="380" cy="380" r="10" fill="white" opacity="0.8"/>
  <circle cx="120" cy="120" r="8" fill="white" opacity="0.6"/>
</svg>
