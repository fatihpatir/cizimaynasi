<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Derin Gradyan Arka Plan -->
    <linearGradient id="bg_grad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1A1A1C"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    
    <!-- Cam Efekti Gradyanı -->
    <linearGradient id="glass_grad" x1="140" y1="140" x2="372" y2="372" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.2"/>
      <stop offset="1" stop-color="white" stop-opacity="0.05"/>
    </linearGradient>

    <!-- Altın Vurgu Gradyanı -->
    <linearGradient id="gold_grad" x1="300" y1="100" x2="450" y2="250" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFD700"/>
      <stop offset="1" stop-color="#FF8C00"/>
    </linearGradient>

    <filter id="blur_filter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="15"/>
    </filter>
  </defs>

  <!-- Apple Style Rounded Frame -->
  <rect width="512" height="512" rx="114" fill="url(#bg_grad)"/>
  
  <!-- Subtle Inner Glow -->
  <rect x="10" y="10" width="492" height="492" rx="104" stroke="white" stroke-opacity="0.1" stroke-width="2"/>

  <!-- Mirror / Lens Base -->
  <circle cx="256" cy="256" r="140" fill="#2C2C2E" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
  <circle cx="256" cy="256" r="120" fill="url(#glass_grad)" stroke="white" stroke-opacity="0.2" stroke-width="2"/>
  
  <!-- Stylized Aperture / Mirror Reflection -->
  <path d="M256 136C189.726 136 136 189.726 136 256C136 322.274 189.726 376 256 376C322.274 376 376 322.274 376 256" stroke="url(#gold_grad)" stroke-width="8" stroke-linecap="round" opacity="0.8"/>
  
  <!-- The "Pencil" Stroke -->
  <path d="M420 120L200 340L160 380L160 340L180 320" stroke="white" stroke-width="24" stroke-linecap="round" opacity="0.9"/>
  <path d="M420 120L200 340" stroke="url(#gold_grad)" stroke-width="12" stroke-linecap="round"/>
  
  <!-- Lens Center -->
  <circle cx="256" cy="256" r="20" fill="white" opacity="0.9"/>
  <circle cx="262" cy="250" r="6" fill="white"/>
</svg>
