<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Çizim Aynası | İz Çiz AR</title>
    <meta name="description" content="Çocuk Gelişimi ve Moda Tasarımı öğrencileri için AR çizim asistanı.">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Açılış Ekranı -->
    <div id="splash-screen">
        <div class="splash-content">
            <div class="splash-logo">🪞</div>
            <h1>Çizim Aynası</h1>
            <div class="loader"></div>
        </div>
    </div>

    <!-- Canlı Kamera Görüntüsü -->
    <div id="camera-container">
        <video id="camera-stream" autoplay playsinline muted></video>
    </div>

    <!-- Üzerine Bindirilen Resim -->
    <div id="overlay-container">
        <img id="overlay-image" src="" alt="" style="display: none;">
    </div>

    <!-- Üst Arayüz (Yeni Düzen) -->
    <div class="ui-overlay top-bar">
        <a href="https://fatihpatir.github.io/web" target="_blank" class="brand-signature">Fatih PATIR</a>
        <div class="top-controls">
            <button class="action-btn" id="install-btn" style="display: none;">Yükle</button>
            <button class="info-btn" id="info-trigger">i</button>
        </div>
    </div>

    <!-- Alt Kontrol Paneli (Dock) -->
    <div class="ui-overlay bottom-dock">
        <div id="dock-toggle">▼</div>

        <!-- 1. Satır: Saydamlık -->
        <div class="dock-row main-row">
            <div class="slider-container full-width">
                <label>Saydamlık</label>
                <input type="range" id="opacity-slider" min="0" max="1" step="0.01" value="0.5">
            </div>
        </div>

        <!-- 2. Satır: Aksiyonlar -->
        <div class="dock-row">
            <input type="file" id="file-input" accept="image/*" hidden>
            <button class="action-btn" onclick="document.getElementById('file-input').click()">Resim Seç</button>
            <button class="action-btn rotate-btn" id="rotate-btn" title="Döndür">↻</button>
            <button class="action-btn rotate-btn" id="flip-btn" title="Aynala">⇄</button>
            <button class="action-btn rotate-btn" id="torch-btn" title="Işığı Aç">🔦</button>
        </div>

        <!-- 3. Satır: Ayarlar -->
        <div class="dock-row">
            <div class="slider-container">
                <label>Boyut</label>
                <input type="range" id="size-slider" min="0.1" max="3" step="0.1" value="1">
            </div>
            <div class="slider-container">
                <label>Kontrast</label>
                <input type="range" id="contrast-slider" min="0" max="200" step="1" value="100">
            </div>
        </div>

        <!-- 4. Satır: Perspektif -->
        <div class="dock-row">
            <div class="slider-container">
                <label>Eğim X</label>
                <input type="range" id="tilt-x-slider" min="-60" max="60" step="1" value="0">
            </div>
            <div class="slider-container">
                <label>Eğim Y</label>
                <input type="range" id="tilt-y-slider" min="-60" max="60" step="1" value="0">
            </div>
        </div>
    </div>

    <!-- Bilgi Modalı (Sadeleştirilmiş Premium) -->
    <div id="info-modal" class="modal">
        <div class="modal-content help-manual">
            <div class="manual-header-slim">
                <div class="header-icon-small">✨</div>
                <h2>Nasıl Kullanılır?</h2>
            </div>
            
            <div class="manual-body">
                <div class="help-card-slim">
                    <span class="card-num">1</span>
                    <p>Telefonu standa sabitle, altına kağıdı koy.</p>
                </div>
                <div class="help-card-slim">
                    <span class="card-num">2</span>
                    <p>Resmini seç, parmaklarınla yerleştir.</p>
                </div>
                <div class="help-card-slim">
                    <span class="card-num">3</span>
                    <p>Saydamlık ve perspektif ayarını yap.</p>
                </div>
                <div class="help-card-slim">
                    <span class="card-num">4</span>
                    <p>Ekrana bakarak kağıda çizmeye başla.</p>
                </div>
            </div>

            <div class="manual-footer-slim">
                <button class="action-btn slim-btn" id="close-modal">Başla</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log(err));
            });
        }
    </script>
</body>
</html>
